name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-test-secret

  lighthouse:
    runs-on: ubuntu-latest
    needs: lint-test-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-test-secret

      - name: Start server
        run: npm run start &
        env:
          AUTH_SECRET: ci-test-secret

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/login
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json
